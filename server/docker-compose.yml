services:
  gpm-sync:
    build: .
    container_name: gpm-sync
    restart: unless-stopped
    expose:
      - "8787"
    environment:
      GOOGLE_DESKTOP_CLIENT_ID: ${GOOGLE_DESKTOP_CLIENT_ID}
      BIND_ADDR: 0.0.0.0:8787
      DATABASE_URL: /data/sync.db
      SESSION_TTL_DAYS: "60"
      RUST_LOG: info
    volumes:
      - gpm-sync-data:/data
    networks:
      - default
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gpm-sync.rule=Host(`gpm-sync.leonardomanrique.com`)"
      - "traefik.http.routers.gpm-sync.entrypoints=websecure"
      - "traefik.http.routers.gpm-sync.tls.certresolver=letsencrypt"
      - "traefik.http.routers.gpm-sync.middlewares=secure-headers@file"
      - "traefik.http.services.gpm-sync.loadbalancer.server.port=8787"

volumes:
  gpm-sync-data:

networks:
  traefik-network:
    external: true
