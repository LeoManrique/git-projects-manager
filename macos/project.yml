name: GitProjectsManager
options:
  bundleIdPrefix: com.gitprojectsmanager
  createIntermediateGroups: true

targets:
  GitProjectsManager:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: GitProjectsManager
      - path: generated/gpm_ffi.swift
        group: Generated
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gitprojectsmanager.mac
        PRODUCT_NAME: Git Projects Manager
        MARKETING_VERSION: "2.2.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        # UniFFI-generated bindings do not compile under a MainActor default
        # isolation (https://github.com/mozilla/uniffi-rs/issues/2818).
        SWIFT_DEFAULT_ACTOR_ISOLATION: nonisolated
        SWIFT_INCLUDE_PATHS: $(SRCROOT)/generated
        # -lz and -liconv are required by the vendored libgit2 inside the
        # Rust staticlib; Security/SystemConfiguration by keyring/reqwest.
        OTHER_LDFLAGS: $(inherited) -lgpm_ffi -lz -liconv
        ENABLE_USER_SCRIPT_SANDBOXING: false
        ENABLE_HARDENED_RUNTIME: false
        # No App Intents in this app — skip the metadata extractor (it logs a
        # "Metadata extraction skipped" warning on every build otherwise).
        LM_SKIP_METADATA_EXTRACTION: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        DEAD_CODE_STRIPPING: true
        GENERATE_INFOPLIST_FILE: false
      configs:
        Debug:
          LIBRARY_SEARCH_PATHS: $(inherited) $(SRCROOT)/ffi/target/debug
        Release:
          LIBRARY_SEARCH_PATHS: $(inherited) $(SRCROOT)/ffi/target/release
    dependencies:
      - sdk: Security.framework
      - sdk: SystemConfiguration.framework
    info:
      path: GitProjectsManager/Info.plist
      properties:
        CFBundleDisplayName: Git Projects Manager
        CFBundleIconFile: AppIcon
        LSMinimumSystemVersion: "26.0"
        LSApplicationCategoryType: public.app-category.developer-tools
        NSHumanReadableCopyright: ""
    preBuildScripts:
      - name: Build Rust core
        shell: /bin/bash
        script: |
          set -euo pipefail
          "$SRCROOT/scripts/build-rust.sh" "$CONFIGURATION"
        basedOnDependencyAnalysis: false
